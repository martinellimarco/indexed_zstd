name: tests

on: [push, pull_request]

jobs:
  Tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Oldest and newest versions should be enough. Python versions are supported 5 years from release date.
        # 3.10 was released 2021-10-04 and end-of-life will be 2026-10-25
        # 3.11 was released 2022-10-24 and end-of-life will be 2027-10-24
        # 3.12 was released 2023-10-02 and end-of-life will be 2028-10
        # 3.13 was released 2024-10-07 and end-of-life will be 2029-10
        # 3.14 was released 2025-10-07 and end-of-life will be 2030-10
        python-version: ['3.10', '3.14']
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Dependencies (macos)
      if: startsWith(matrix.os, 'macos')
      run: |
        brew update && brew reinstall zstd

    - name: Install Dependencies (ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get -y install libzstd-dev g++

    - name: Install Dependencies (windows)
      if: matrix.os == 'windows-latest'
      run: |
        python libzstd/_get_zstd.py
        copy libzstd/lib/libzstd.dll C:\Windows\System32\
        regsvr32 C:\Windows\System32\libzstd.dll

    - name: Install Python Modules
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install --upgrade-strategy eager --upgrade cython twine cibuildwheel setuptools pytest

    - name: Test Installation From Tarball
      shell: bash
      env:
        LIBZSTD_DIR: ${{ github.workspace }}\libzstd  # windows
      run: |
        python3 setup.py sdist
        twine check dist/*
        python3 -m pip install dist/*.tar.gz

    - name: Build gen_seekable from submodule
      if: matrix.os != 'windows-latest'
      run: |
        cmake -S indexed_zstd/libzstd-seek -B indexed_zstd/libzstd-seek/build
        cmake --build indexed_zstd/libzstd-seek/build --target gen_seekable
        echo "${{ github.workspace }}/indexed_zstd/libzstd-seek/build/tests" >> $GITHUB_PATH

    - name: Test Python Package (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        python3 -m pytest tests/ -v -m "not heavy and not reference"

    - name: Test Python Package (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        python3 -c "import indexed_zstd; print('indexed_zstd imported successfully')"

  Build-Wheels:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install Python Dependencies
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install --upgrade-strategy eager --upgrade cython twine cibuildwheel setuptools

    - name: Build Tarball
      if: matrix.os == 'ubuntu-latest'
      run: python3 setup.py sdist

    - name: Build Wheels
      env:
        CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
        CIBW_MUSLLINUX_X86_64_IMAGE: musllinux_1_2
        CIBW_ARCHS: auto64
        CIBW_ARCHS_MACOS: "x86_64 arm64"
        CIBW_BEFORE_ALL_LINUX: dnf install -y libzstd-devel || apk add zstd-dev
        CIBW_BEFORE_ALL_MACOS: brew update && brew reinstall zstd
        CIBW_BEFORE_BUILD_WINDOWS: "python {package}/libzstd/_get_zstd.py && pip install delvewheel"
        CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: "delvewheel repair -w {dest_dir} {wheel}"
      run: python -m cibuildwheel --output-dir dist

    - name: Check Wheels
      run: twine check dist/*
